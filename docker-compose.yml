services:
  postgres:
    image: postgres:17-alpine
    container_name: credit-contract-postgres
    environment:
      POSTGRES_DB: credit_contracts
      POSTGRES_USER: credit_contract
      POSTGRES_PASSWORD: credit_contract
    ports:
      - "5432:5432"
    volumes:
      - credit-contract-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_contract -d credit_contracts"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    container_name: credit-contract-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: credit_contract
      RABBITMQ_DEFAULT_PASS: credit_contract
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - credit-contract-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  credit-contract-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-contract-manager:latest
    container_name: credit-contract-manager
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/credit_contracts
      DB_USERNAME: credit_contract
      DB_PASSWORD: credit_contract
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: credit_contract
      RABBITMQ_PASSWORD: credit_contract
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: credit-contract-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - credit-contract-prometheus-data:/prometheus
    depends_on:
      credit-contract-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    container_name: credit-contract-loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/local-config.yml"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/local-config.yml:ro
      - credit-contract-loki-data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-config.file=/etc/loki/local-config.yml", "-verify-config=true"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: credit-contract-alloy
    ports:
      - "12345:12345"
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - credit-contract-alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/alloy", "fmt", "--test", "/etc/alloy/config.alloy"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.2
    container_name: credit-contract-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: "false"
    volumes:
      - credit-contract-grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./observability/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  credit-contract-postgres-data:
  credit-contract-rabbitmq-data:
  credit-contract-prometheus-data:
  credit-contract-grafana-data:
  credit-contract-loki-data:
  credit-contract-alloy-data:
