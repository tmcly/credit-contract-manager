services:
  credit-contract-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-contract-manager:latest
    container_name: credit-contract-manager
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
