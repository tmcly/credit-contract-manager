spring.application.name=credit-contract-manager

# PostgreSQL persistence. Environment variables keep local and container
# execution aligned without committing credentials for shared environments.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/credit_contracts}
spring.datasource.username=${DB_USERNAME:credit_contract}
spring.datasource.password=${DB_PASSWORD:credit_contract}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# RabbitMQ and transactional-outbox relay. Correlated publisher confirms are
# required before an outbox event can be marked as published.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:credit_contract}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:credit_contract}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
credit-contract.outbox.batch-size=${OUTBOX_BATCH_SIZE:50}
credit-contract.outbox.initial-delay=${OUTBOX_INITIAL_DELAY:1s}
credit-contract.outbox.fixed-delay=${OUTBOX_FIXED_DELAY:1s}
credit-contract.outbox.retry-initial-delay=${OUTBOX_RETRY_INITIAL_DELAY:1s}
credit-contract.outbox.retry-max-delay=${OUTBOX_RETRY_MAX_DELAY:1m}
credit-contract.outbox.max-attempts=${OUTBOX_MAX_ATTEMPTS:8}
credit-contract.outbox.confirm-timeout=${OUTBOX_CONFIRM_TIMEOUT:5s}

# Inbound retries are local and bounded. Exhausted messages are rejected and
# RabbitMQ routes them to the durable dead-letter queue declared by the app.
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=${CONSUMER_RETRY_INITIAL_INTERVAL:1s}
spring.rabbitmq.listener.simple.retry.multiplier=${CONSUMER_RETRY_MULTIPLIER:2}
spring.rabbitmq.listener.simple.retry.max-interval=${CONSUMER_RETRY_MAX_INTERVAL:10s}
spring.rabbitmq.listener.simple.retry.max-attempts=${CONSUMER_RETRY_MAX_ATTEMPTS:4}

# Application port
server.port=8080

# Actuator: exposes the native Spring Boot healthcheck
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Custom health endpoint (in addition to actuator)
# GET /health -> { "status": "UP" }
